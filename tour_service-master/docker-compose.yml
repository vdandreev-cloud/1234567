services:
  postgres:
    container_name: postgres_container
    image: postgres:18.3-alpine3.23
    environment:
      POSTGRES_DB: "tour-service"
      POSTGRES_USER: "admin"
      POSTGRES_PASSWORD: "admin"
      PGDATA: "/var/lib/postgresql/data/pgdata"
    volumes:
      - pg-data://C/Users/Oi_Solar/docker-mounted-pgdata
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d tour-service"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    networks:
      - app-net

#  pgadmin:
