  backend-app:
    build:
      context: ./
      dockerfile: dev-tools/Dockerfile
    container_name: backend-app
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          memory: 1G
    environment:
      - JAVA_TOOL_OPTIONS=-XX:MaxRAMPercentage=80.0
    depends_on:
      - postgres
    networks:
      - app-net
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend-app
    networks:
      - app-net

volumes:
  pg-data:
  pgadmin-data:

networks:
  app-net:
    driver: bridge